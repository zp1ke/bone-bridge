name: app
description: 'App project'
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  annotations:
    path: ../annotations/
  appwrite: ^13.0.0
  chopper: ^8.0.2
  collection: any
  crypto: ^3.0.5
  cupertino_icons: ^1.0.8
  dropdown_search: ^5.0.6
  encrypt: ^5.0.3
  file_picker: ^8.1.2
  flex_color_scheme: ^7.3.1
  fluentui_system_icons: ^1.1.257
  get_it: ^7.7.0
  go_router: ^14.2.7
  intl: any
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.2
  provider: ^6.1.2
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2
  simple_icons: ^10.1.3
  string_similarity: ^2.1.1
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  chopper_generator: ^8.0.2
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  generators:
    path: ../generators/
  json_serializable: ^6.8.0
  test: any

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/license.txt
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Thin.ttf
          weight: 100
        - asset: assets/fonts/lato/Lato-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/lato/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/lato/Lato-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/lato/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/lato/Lato-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/lato/Lato-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/lato/Lato-Black.ttf
          weight: 900
        - asset: assets/fonts/lato/Lato-BlackItalic.ttf
          weight: 900
          style: italic
